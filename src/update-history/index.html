<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title data-i18n="history.title">Pikachu Volleyball update history</title>
    <meta
      name="description"
      data-i18n-attr="content:history.description"
      content="Update history for Pikachu Volleyball P2P Online"
    />
    <meta name="author" data-i18n-attr="content:meta.author" content="Kyutae Lee" />

    <meta name="theme-color" content="#FFFFFF" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/resources/assets/images/IDI_PIKAICON-0.png"
    />
    <link rel="stylesheet" href="../resources/style.css" />
  </head>
  <body>
    <div id="update-history-container">
      <div id="about-box-head">
        <h1>
          <span data-i18n="history.heading_main">Pikachu Volleyball</span>
          <span class="no-wrap" data-i18n="history.heading_sub">update history</span>
        </h1>
        <div class="color-scheme-toggle-switch-container">
          <input
            type="checkbox"
            id="dark-color-scheme-checkbox-1"
            class="toggle-switch dark-color-scheme-checkbox"
          />
          <label for="dark-color-scheme-checkbox-1"></label>
        </div>
        <p class="languages">
          <button type="button" class="lang-btn" data-locale="zh">Chinese(中文)</button>
          |
          <button type="button" class="lang-btn" data-locale="en">English</button>
          |
          <button type="button" class="lang-btn" data-locale="ko">Korean(한국어)</button>
        </p>
        <p class="small" data-i18n-html="history.back_html">
          Back to <a href="../">the offline web version</a>
        </p>
        <p class="small" data-i18n="history.only_major">Only major updates are recorded here.</p>
      </div>
      <div class="margin-top limit-width">
        <div class="indent-minus" data-i18n-html="history.entries_html"></div>
      </div>
    </div>
    <div class="for-margin"></div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
